name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist:win

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          npm run dist:linux

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: baseflow-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # JDK 17 fails the Gradle build: capacitor-android's compileDebugJavaWithJavac wants
      # --release 21 ("invalid source release: 21"), so javac needs to run under a JDK that's
      # at least that new (2026-07-22, run #2). BUILD.md's "JDK 17" prerequisite is stale too.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Add Android project
        run: npx cap add android

      # Capacitor 8's generated project targets compileSdk/targetSdk 36 (android/variables.gradle) --
      # newer than the default package set android-actions/setup-android installs, so the first
      # Gradle build failed trying to fetch it without pre-accepted licenses (2026-07-22, run #1).
      - name: Install Android SDK platform matching the generated project
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" || sdkmanager "platforms;android-36"

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: baseflow-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
